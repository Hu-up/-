<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>男生宿舍选择</title>
  <style>
    :root {
      --bg: #edf5ff;
      --panel: #ffffff;
      --ink: #10223f;
      --muted: #617491;
      --line: #c9dcf2;
      --blue: #1d64d8;
      --blue-deep: #0f3f91;
      --blue-soft: #e4f0ff;
      --green: #16803c;
      --green-soft: #e7f6ec;
      --red: #b42318;
      --red-soft: #fdecec;
      --amber: #946200;
      --amber-soft: #fff4d6;
      --shadow: 0 12px 32px rgba(29, 36, 51, .08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px;
      background: #0f3f91;
      color: #f8fafc;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #ffffff;
      color: var(--blue-deep);
      font-weight: 800;
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 2px;
      font-size: 22px;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: #cfe2ff;
      font-size: 14px;
    }

    nav {
      display: grid;
      gap: 8px;
      margin-bottom: 28px;
    }

    .nav-button {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 12px;
      border-radius: 8px;
      background: transparent;
      color: #e6f0ff;
      text-decoration: none;
      text-align: left;
    }

    .nav-button.active {
      background: #ffffff;
      color: var(--blue-deep);
      font-weight: 800;
    }

    .nav-button.active {
      box-shadow: inset 4px 0 0 #80b7ff;
    }

    .nav-button:not(.active):hover {
      background: rgba(255, 255, 255, .12);
      color: #ffffff;
    }

    .side-card {
      padding: 16px;
      border: 1px solid rgba(255, 255, 255, .12);
      border-radius: 8px;
      background: rgba(255, 255, 255, .06);
    }

    .side-card strong {
      display: block;
      margin-bottom: 8px;
    }

    .side-card p {
      margin-bottom: 0;
      color: #c6d1e2;
      font-size: 14px;
    }

    .sync-status {
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 8px;
      background: rgba(255, 255, 255, .1);
      color: #e6f0ff;
      font-size: 13px;
    }

    main {
      min-width: 0;
      padding: 28px;
    }

    .topbar {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      margin-bottom: 22px;
    }

    .topbar h2 {
      margin-bottom: 4px;
      font-size: 28px;
      letter-spacing: 0;
    }

    .topbar p {
      margin-bottom: 0;
      color: var(--muted);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    .button {
      min-height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 9px 14px;
      border-radius: 8px;
      background: var(--blue);
      color: #ffffff;
      font-weight: 650;
      white-space: nowrap;
    }

    .button.secondary {
      border: 1px solid var(--line);
      background: #ffffff;
      color: var(--ink);
    }

    .button.danger {
      background: var(--red);
    }

    .button:disabled {
      opacity: .5;
      cursor: not-allowed;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 18px;
    }

    .stat {
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: 13px;
    }

    .stat strong {
      display: block;
      margin-top: 6px;
      font-size: 28px;
      line-height: 1;
    }

    .grid {
      display: grid;
      grid-template-columns: 340px minmax(0, 1fr);
      gap: 18px;
