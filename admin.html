<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>宿舍选择后台</title>
  <style>
    :root {
      --bg: #edf5ff;
      --panel: #ffffff;
      --ink: #10223f;
      --muted: #617491;
      --line: #c9dcf2;
      --blue: #1d64d8;
      --blue-deep: #0f3f91;
      --blue-soft: #e4f0ff;
      --green: #16803c;
      --green-soft: #e7f6ec;
      --red: #b42318;
      --red-soft: #fdecec;
      --amber: #946200;
      --amber-soft: #fff4d6;
      --shadow: 0 12px 32px rgba(29, 36, 51, .08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.5;
    }

    button, input, select, textarea {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    .app-shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
    }

    aside {
      position: sticky;
      top: 0;
      height: 100vh;
      padding: 24px;
      background: #0f3f91;
      color: #f8fafc;
      overflow-y: auto;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border-radius: 8px;
      background: #ffffff;
      color: var(--blue-deep);
      font-weight: 800;
    }

    h1, h2, h3, p {
      margin-top: 0;
    }

    h1 {
      margin-bottom: 2px;
      font-size: 22px;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 0;
      color: #cfe2ff;
      font-size: 14px;
    }
